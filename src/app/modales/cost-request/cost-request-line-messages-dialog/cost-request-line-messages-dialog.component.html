@if (currentUserUid()) {
  <app-conversation
    (messageCreationEmitter)="messageCreationReceiver($event)"
    (messageDeletionEmitter)="messageDeletionReceiver($event)"
    (messageUndoEmitter)="messageUndoReceiver($event)"
    (messageUpdateEmitter)="messageUpdateReceiver($event)"
    [currentUserUid]="currentUserUid()!"
    [messages]="allMessages()"
    [readonly]="readOnly()"
  ></app-conversation>
}
