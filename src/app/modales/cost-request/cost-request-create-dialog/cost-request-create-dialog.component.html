<div class="metadata-container">
  <form [formGroup]="costRequestForm">
    <div class="p-fields-row">
      <div class="p-field">
        <label for="methodType"
          >Customer <span class="required-indicator">*</span></label
        >
        <p-select
          [filter]="true"
          [formControlName]="CostRequestFormField.CUSTOMER"
          [options]="customers()"
          filterBy="name"
          optionLabel="name"
          placeholder="Select customer"
        ></p-select>
      </div>
      <div class="p-field">
        <app-input-container
          [formControlName]="CostRequestFormField.PROJECT_NAME"
          label="Project Name"
          placeholder="Project Name"
        ></app-input-container>
      </div>
      <div class="p-field">
        <label for="methodType"
          >Currency <span class="required-indicator">*</span></label
        >
        <p-select
          [formControlName]="CostRequestFormField.CURRENCY"
          [options]="currencies()"
          optionLabel="code"
          placeholder="Select currency"
        ></p-select>
      </div>
    </div>
    <div class="p-fields-row">
      <div class="p-field">
        <label for="requestorName">Requestor Name</label>
        <p-iconfield iconPosition="left">
          <p-inputicon
            (click)="showRequestorNames($event)"
            [class]="Icons.LIST"
            pTooltip="Select requestor names"
            style="cursor: pointer"
            tooltipPosition="top"
          ></p-inputicon>
          <input
            [formControlName]="CostRequestFormField.REQUESTOR_NAME"
            id="requestorName"
            pInputText
          />
        </p-iconfield>
        <p-popover
          #requestorNamesPopover
          [styleClass]="
            requestorNamesMessage()
              ? 'popover-' + requestorNamesMessageSeverity()
              : ''
          "
          appendTo="body"
        >
          @if (requestorNamesMessage()) {
            <span>{{ requestorNamesMessage() }}</span>
          } @else {
            <p-listbox
              (onChange)="selectRequestorName($event.value)"
              [filter]="true"
              [options]="requestorNameSuggestions()"
              [style]="{ width: '250px', maxHeight: '300px' }"
              filterPlaceholder="Filter names..."
            ></p-listbox>
          }
        </p-popover>
      </div>
      <div class="p-field">
        <label for="poDate">Purchase Order Expected Date</label>
        <p-datePicker
          [formControlName]="CostRequestFormField.PURCHASE_ORDER_EXPECTED_DATE"
          [minDate]="today"
          [readonlyInput]="true"
          appendTo="body"
          inputId="poDate"
        ></p-datePicker>
      </div>
    </div>
    <div class="p-field">
      <label [for]="CostRequestFormField.CUSTOMER_EMAILS"
        >Customer Emails</label
      >
      <p-iconfield iconPosition="left">
        <p-inputicon
          (click)="showCustomerEmails($event)"
          [class]="Icons.LIST"
          pTooltip="Select customer emails"
          style="cursor: pointer"
          tooltipPosition="top"
        ></p-inputicon>
        <p-autoComplete
          (onAdd)="addEmail($event)"
          [addOnBlur]="true"
          [formControlName]="CostRequestFormField.CUSTOMER_EMAILS"
          [multiple]="true"
          [separator]="RegexPatterns.CHIP_SEPARATOR"
          [typeahead]="false"
          placeholder="e.g: email1@example.com, email2@example.com..."
        >
        </p-autoComplete>
      </p-iconfield>
      <p-popover
        #customerEmailsPopover
        [styleClass]="
          customerEmailsMessage()
            ? 'popover-' + customerEmailsMessageSeverity()
            : ''
        "
        appendTo="body"
      >
        @if (customerEmailsMessage()) {
          <span>{{ customerEmailsMessage() }}</span>
        } @else {
          <p-listbox
            (onChange)="onCustomerEmailsChange($event.value)"
            [(ngModel)]="customerEmailsSelected"
            [checkbox]="true"
            [filter]="true"
            [multiple]="true"
            [ngModelOptions]="{ standalone: true }"
            [options]="customerEmailSuggestions()"
            [style]="{ width: '300px', maxHeight: '300px' }"
            filterPlaceholder="Filter emails..."
          ></p-listbox>
        }
      </p-popover>
    </div>
    <app-cost-request-create-line-requested
      [costRequestForm]="costRequestForm"
      [productNames]="productNames()"
    ></app-cost-request-create-line-requested>
  </form>

  <div class="modal-actions-footer-end">
    <p-button
      (onClick)="onSubmit()"
      [delay]="3000"
      [disabled]="costRequestForm.invalid"
      [icon]="Icons.CHECK"
      [label]="'Create'"
      appNoDoubleClick
      severity="success"
      type="submit"
    ></p-button>
    <p-overlay-badge
      [value]="filesInfo().length > 0 ? filesInfo().length.toString() : '0'"
      severity="info"
    >
      <p-button
        (click)="manageFiles()"
        [icon]="Icons.FOLDER"
        [outlined]="true"
        label="Manage Files"
        severity="secondary"
        type="button"
      ></p-button>
    </p-overlay-badge>
    <p-button
      (click)="closeDialog(false)"
      [icon]="Icons.TIMES"
      [outlined]="true"
      label="Cancel"
      severity="secondary"
      type="button"
    ></p-button>
  </div>
</div>
