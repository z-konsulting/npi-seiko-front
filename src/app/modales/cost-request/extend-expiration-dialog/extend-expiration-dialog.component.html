<div class="extend-dialog">
  <!-- Current expiration info -->
  @if (costRequest(); as cr) {
    <div class="extend-dialog__expired-info">
      <i [class]="Icons.EXCLAMATION_TRIANGLE" class="extend-dialog__warn-icon"></i>
      <div class="extend-dialog__expired-text">
        <span class="extend-dialog__expired-label">Expired on</span>
        <span class="extend-dialog__expired-date">
          {{ cr.expirationDate | date: "dd MMMM yyyy" }}
        </span>
      </div>
    </div>
  }

  <!-- Days input -->
  <div class="extend-dialog__input-section">
    <label class="extend-dialog__label" for="daysInput">
      Number of days to add <span class="extend-dialog__required">*</span>
    </label>
    <p-inputNumber
      (onInput)="onDaysChange($any($event.value))"
      [min]="1"
      [showButtons]="true"
      [ngModel]="daysToAdd()"
      (ngModelChange)="onDaysChange($event)"
      buttonLayout="horizontal"
      decrementButtonIcon="pi pi-minus"
      incrementButtonIcon="pi pi-plus"
      inputId="daysInput"
      mode="decimal"
    />
  </div>

  <!-- New date preview -->
  <div class="extend-dialog__preview">
    <i [class]="Icons.CALENDAR_PLUS" class="extend-dialog__preview-icon"></i>
    <div class="extend-dialog__preview-text">
      <span class="extend-dialog__preview-label">New expiration date</span>
      <span class="extend-dialog__preview-date">
        {{ newExpirationDate() | date: "dd MMMM yyyy" }}
      </span>
    </div>
  </div>

  <!-- Footer -->
  <div class="modal-actions-footer-end">
    <p-button
      (click)="confirm()"
      [disabled]="!isValid()"
      [icon]="Icons.CHECK"
      label="Extend"
      severity="success"
      type="submit"
    />
    <p-button
      (click)="cancel()"
      [icon]="Icons.TIMES"
      [outlined]="true"
      label="Cancel"
      severity="secondary"
    />
  </div>
</div>

<p-button
  (click)="cancel()"
  [icon]="Icons.TIMES"
  [text]="true"
  class="close-modal-btn"
  severity="secondary"
/>
