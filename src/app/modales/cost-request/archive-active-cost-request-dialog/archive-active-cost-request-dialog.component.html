<div class="archive-dialog">
  <!-- Cost request info -->
  @if (costRequest(); as cr) {
    <div class="archive-dialog__info">
      @if (cr.customer) {
        <span class="archive-dialog__customer">{{ cr.customer.name }}</span>
      }
      <span class="archive-dialog__ref">
        {{ cr.costRequestReferenceNumber }} — Rev. {{ cr.costRequestRevision }}
      </span>
    </div>
  }

  <!-- Decision cards -->
  <div class="archive-dialog__choices">
    <button
      (click)="selectDecision('won')"
      [class.archive-dialog__choice--selected]="decision() === 'won'"
      class="archive-dialog__choice archive-dialog__choice--won"
      type="button"
    >
      <i [class]="Icons.TROPHY + ' archive-dialog__choice-icon'"></i>
      <span class="archive-dialog__choice-label">WON</span>
      <span class="archive-dialog__choice-hint"
        >Customer approved the quotation</span
      >
    </button>

    <button
      (click)="selectDecision('lost')"
      [class.archive-dialog__choice--selected]="decision() === 'lost'"
      class="archive-dialog__choice archive-dialog__choice--lost"
      type="button"
    >
      <i [class]="Icons.TIMES_CIRCLE + ' archive-dialog__choice-icon'"></i>
      <span class="archive-dialog__choice-label">LOST</span>
      <span class="archive-dialog__choice-hint"
        >Customer rejected the quotation</span
      >
    </button>

    <button
      (click)="selectDecision('new-revision-created')"
      [class.archive-dialog__choice--selected]="
        decision() === 'new-revision-created'
      "
      class="archive-dialog__choice archive-dialog__choice--new-revision"
      type="button"
    >
      <i [class]="Icons.PLUS_CIRCLE + ' archive-dialog__choice-icon'"></i>
      <span class="archive-dialog__choice-label">NEW REVISION</span>
      <span class="archive-dialog__choice-hint"
        >A new revision was created</span
      >
    </button>
  </div>

  <!-- Reason (only when LOST) -->
  @if (decision() === "lost") {
    <div class="archive-dialog__reason">
      <app-input-container
        [formControl]="reasonControl"
        label="Reason"
        type="textarea"
      />
    </div>
  }

  <!-- Footer actions -->
  <div class="modal-actions-footer-end">
    <p-button
      (click)="confirm()"
      [disabled]="!isValid()"
      [icon]="Icons.ARCHIVE"
      label="Confirm"
      severity="warn"
      type="submit"
    />
    <p-button
      (click)="cancel()"
      [icon]="Icons.TIMES"
      [outlined]="true"
      label="Cancel"
      severity="secondary"
    />
  </div>
</div>

<p-button
  (click)="cancel()"
  [icon]="Icons.TIMES"
  [text]="true"
  class="close-modal-btn"
  severity="secondary"
/>
