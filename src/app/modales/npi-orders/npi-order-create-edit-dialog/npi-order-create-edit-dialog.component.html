<p-card class="container dialog">
  <form [formGroup]="npiOrderForm">
    <div class="form-section">
      <div class="form-section-header">
        <span class="section-label">Order Reference</span>
        <span class="section-line"></span>
      </div>
      <div class="p-fields-row">
        <div class="p-field">
          <app-input-container
            [formControlName]="NpiOrderFormField.PURCHASE_ORDER_NUMBER"
            label="PO Number"
          ></app-input-container>
        </div>
        <div class="p-field">
          <app-input-container
            [formControlName]="NpiOrderFormField.WORK_ORDER_ID"
            label="Work Order #"
          ></app-input-container>
        </div>
        <div class="p-field">
          <app-input-container
            [formControlName]="NpiOrderFormField.PART_NUMBER"
            label="P/N"
          ></app-input-container>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-header">
        <span class="section-label">Customer &amp; Product</span>
        <span class="section-line"></span>
      </div>
      <div class="p-fields-row">
        <div class="p-field">
          <label for="methodType"
            >Customer <span class="required-indicator">*</span></label
          >
          @if (isFinalized()) {
            <div class="readonly-field">
              {{ npiOrderSelected()?.customer?.name }}
            </div>
          } @else {
            <p-select
              [filter]="true"
              [formControlName]="NpiOrderFormField.CUSTOMER"
              [options]="customers()"
              appendTo="body"
              filterBy="name"
              optionLabel="name"
              placeholder="Select customer"
            ></p-select>
          }
        </div>
        <div class="p-field">
          <app-input-container
            [formControlName]="NpiOrderFormField.PRODUCT_NAME"
            label="Product Name"
          ></app-input-container>
        </div>
        <div class="p-field">
          <app-input-container
            [formControlName]="NpiOrderFormField.QUANTITY"
            [maxFractionDigits]="0"
            [minFractionDigits]="0"
            [min]="1"
            label="Quantity"
            type="number"
          ></app-input-container>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-header">
        <span class="section-label">Schedule</span>
        <span class="section-line"></span>
      </div>
      <div class="p-fields-row">
        <div class="p-field">
          <label>Order Date <span class="required-indicator">*</span></label>
          <p-datePicker
            [formControlName]="NpiOrderFormField.ORDER_DATE"
            appendTo="body"
            dateFormat="yy-mm-dd"
            placeholder="Select order date"
          ></p-datePicker>
        </div>
        <div class="p-field">
          <label>Target Delivery Date</label>
          <p-datePicker
            [formControlName]="NpiOrderFormField.TARGET_DELIVERY_DATE"
            [minDate]="targetDeliveryMinDate()"
            appendTo="body"
            dateFormat="yy-mm-dd"
            placeholder="Select target delivery date"
          ></p-datePicker>
        </div>
      </div>
    </div>
  </form>
  <div class="modal-actions-footer-end">
    @if (!readonly()) {
      <p-button
        (click)="submit()"
        [disabled]="npiOrderForm.invalid"
        [icon]="Icons.CHECK"
        [label]="editMode() ? 'Update' : 'Create'"
        severity="success"
        type="submit"
      ></p-button>
    }
    <p-overlay-badge
      [value]="filesInfo().length > 0 ? filesInfo().length.toString() : '0'"
      severity="info"
    >
      <p-button
        (click)="manageFiles()"
        [icon]="Icons.FOLDER"
        [outlined]="true"
        label="Manage Files"
        severity="secondary"
        type="button"
      ></p-button>
    </p-overlay-badge>
    <p-button
      (click)="closeDialog(false)"
      [icon]="Icons.TIMES"
      [outlined]="true"
      label="Cancel"
      severity="secondary"
      type="button"
    ></p-button>
  </div>
</p-card>
