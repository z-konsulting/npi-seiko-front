<p-card class="container dialog">
  <form [formGroup]="npiOrderForm">
    <div class="form-section">
      <div class="form-section-header">
        <span class="section-label">Order Reference</span>
        <span class="section-line"></span>
      </div>
      <div class="p-fields-row">
        <div class="p-field">
          <app-input-container
            [formControlName]="NpiOrderFormField.PURCHASE_ORDER_NUMBER"
            label="PO Number"
          ></app-input-container>
        </div>
        <div class="p-field">
          <app-input-container
            [formControlName]="NpiOrderFormField.WORK_ORDER_ID"
            label="Work Order #"
          ></app-input-container>
        </div>
        <div class="p-field">
          <app-input-container
            [formControlName]="NpiOrderFormField.PART_NUMBER"
            label="P/N"
          ></app-input-container>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-header">
        <span class="section-label">Customer &amp; Product</span>
        <span class="section-line"></span>
      </div>
      <div class="p-fields-row">
        <div class="p-field">
          <app-input-container
            [formControlName]="NpiOrderFormField.CUSTOMER_NAME"
            label="Customer Name"
          ></app-input-container>
        </div>
        <div class="p-field">
          <app-input-container
            [formControlName]="NpiOrderFormField.PRODUCT_NAME"
            label="Product Name"
          ></app-input-container>
        </div>
        <div class="p-field">
          <app-input-container
            [formControlName]="NpiOrderFormField.QUANTITY"
            [maxFractionDigits]="0"
            [minFractionDigits]="0"
            [min]="1"
            label="Quantity"
            type="number"
          ></app-input-container>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-header">
        <span class="section-label">Schedule</span>
        <span class="section-line"></span>
      </div>
      <div class="p-fields-row">
        <div class="p-field">
          <label>Order Date <span class="required-indicator">*</span></label>
          <p-datePicker
            [formControlName]="NpiOrderFormField.ORDER_DATE"
            appendTo="body"
            dateFormat="yy-mm-dd"
            placeholder="Select order date"
          ></p-datePicker>
        </div>
        <div class="p-field">
          <label>Target Delivery Date</label>
          <p-datePicker
            [formControlName]="NpiOrderFormField.TARGET_DELIVERY_DATE"
            appendTo="body"
            dateFormat="yy-mm-dd"
            placeholder="Select target delivery date"
          ></p-datePicker>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-header">
        <span class="section-label">Process Planning</span>
        <span class="section-line"></span>
      </div>
      <div class="plan-time-hint" role="note">
        <i class="pi pi-info-circle"></i>
        <span
          >Estimated time (in hours) allocated for each stage in the NPI
          pipeline.</span
        >
      </div>
      <div class="p-fields-row">
        <div class="p-field">
          <app-input-container
            [formControlName]="
              NpiOrderFormField.MATERIAL_PURCHASE_PLAN_TIME_IN_DAYS
            "
            label="Material Purchase (days)"
            type="number"
          ></app-input-container>
        </div>
        <div class="p-field">
          <app-input-container
            [formControlName]="
              NpiOrderFormField.MATERIAL_RECEIVING_PLAN_TIME_IN_DAYS
            "
            label="Material Receiving (days)"
            type="number"
          ></app-input-container>
        </div>
        <div class="p-field">
          <app-input-container
            [formControlName]="NpiOrderFormField.PRODUCTION_PLAN_TIME_IN_DAYS"
            label="Production (days)"
            type="number"
          ></app-input-container>
        </div>
      </div>
      <div class="p-fields-row">
        <div class="p-field">
          <app-input-container
            [formControlName]="NpiOrderFormField.TESTING_PLAN_TIME_IN_DAYS"
            label="Testing (days)"
            type="number"
          ></app-input-container>
        </div>
        <div class="p-field">
          <app-input-container
            [formControlName]="NpiOrderFormField.SHIPPING_PLAN_TIME_IN_DAYS"
            label="Shipping (days)"
            type="number"
          ></app-input-container>
        </div>
        <div class="p-field">
          <app-input-container
            [formControlName]="
              NpiOrderFormField.CUSTOMER_APPROVAL_PLAN_TIME_IN_DAYS
            "
            label="Customer Approval (days)"
            type="number"
          ></app-input-container>
        </div>
      </div>
    </div>

    @if (!readonly()) {
      <p-button
        (click)="submit()"
        [disabled]="npiOrderForm.invalid"
        [icon]="Icons.CHECK"
        [label]="editMode() ? 'Update' : 'Create'"
        class="modal-btn"
        severity="success"
        type="submit"
      ></p-button>
    }
  </form>
</p-card>
