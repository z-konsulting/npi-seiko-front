<p-card class="container dialog">
  <form [formGroup]="productionDatesForm">
    <div class="form-section">
      <div class="form-section-header">
        <span class="section-label">Process Planning</span>
        <span class="section-line"></span>
      </div>
      <div class="plan-time-hint" role="note">
        <i [class]="Icons.INFO_CIRCLE"></i>
        <span
          >Set the estimated date for Material Purchase, then the duration (in
          working days) for Receiving, Production, and Testing. Weekends are
          excluded. Shipping and Customer Approval dates are constrained by the
          preceding stages.</span
        >
      </div>
      <div class="p-fields-row">
        <div class="p-field">
          <label
            >Material Purchase Date
            <span class="required-indicator">*</span></label
          >
          <p-datePicker
            [formControlName]="
              NpiOrderFormField.MATERIAL_PURCHASE_ESTIMATED_DATE
            "
            [minDate]="minMaterialPurchaseDate()"
            appendTo="body"
            dateFormat="yy-mm-dd"
            placeholder="Select purchase date"
          ></p-datePicker>
        </div>
        <div class="p-field">
          <app-input-container
            [formControlName]="
              NpiOrderFormField.MATERIAL_RECEIVING_PLAN_TIME_IN_DAYS
            "
            label="Material lead time (days)"
            type="number"
          ></app-input-container>
        </div>
        <div class="p-field">
          <app-input-container
            [formControlName]="NpiOrderFormField.PRODUCTION_PLAN_TIME_IN_DAYS"
            label="Production estimate time (days)"
            type="number"
          ></app-input-container>
        </div>
      </div>
      <div class="p-fields-row">
        <div class="p-field">
          <app-input-container
            [formControlName]="NpiOrderFormField.TESTING_PLAN_TIME_IN_DAYS"
            label="Testing time (days)"
            type="number"
          ></app-input-container>
        </div>
        <div class="p-field">
          <label>Shipping date <span class="required-indicator">*</span></label>
          <p-datePicker
            [disabled]="shippingDateDisabled()"
            [formControlName]="NpiOrderFormField.SHIPPING_ESTIMATED_DATE"
            [minDate]="minShippingDate()"
            appendTo="body"
            dateFormat="yy-mm-dd"
            placeholder="Fill upstream fields first"
          ></p-datePicker>
        </div>
        <div class="p-field">
          <label
            >Customer approval estimated date
            <span class="required-indicator">*</span></label
          >
          <p-datePicker
            [disabled]="customerApprovalDateDisabled()"
            [formControlName]="
              NpiOrderFormField.CUSTOMER_APPROVAL_ESTIMATED_DATE
            "
            [minDate]="minCustomerApprovalDate()"
            appendTo="body"
            dateFormat="yy-mm-dd"
            placeholder="Select shipping date first"
          ></p-datePicker>
        </div>
      </div>
    </div>
  </form>
  <div class="modal-actions-footer-end">
    @if (!readonly()) {
      <p-button
        (click)="submit()"
        [disabled]="productionDatesForm.invalid"
        [icon]="Icons.CHECK"
        label="Save"
        severity="success"
        type="submit"
      ></p-button>
    }
    <p-button
      (click)="closeDialog(false)"
      [icon]="Icons.TIMES"
      [outlined]="true"
      label="Close"
      severity="secondary"
      type="button"
    ></p-button>
  </div>
</p-card>
