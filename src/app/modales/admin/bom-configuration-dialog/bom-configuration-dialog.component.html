<p-card class="container dialog">
  <form [formGroup]="form">

    <!-- Configuration name -->
    <div class="name-field">
      <app-input-container
        [formControlName]="BomConfigFormField.NAME"
        label="Configuration Name"
      ></app-input-container>
    </div>

    <!-- Shared BOM mapping fields -->
    <app-bom-mapping-form></app-bom-mapping-form>

    <p-button
      (click)="save()"
      [disabled]="!form.valid"
      [icon]="Icons.CHECK"
      [label]="editMode() ? 'Update' : 'Create'"
      class="modal-btn"
      severity="success"
      type="submit"
    ></p-button>

  </form>
</p-card>
