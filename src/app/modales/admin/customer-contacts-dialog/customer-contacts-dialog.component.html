@if (isLoading()) {
  <div class="loading-container">
    <p-progressSpinner ariaLabel="Loading" />
  </div>
} @else {
  <p-tabs [value]="0">
    <p-tablist>
      <p-tab [value]="0">Requestor Names</p-tab>
      <p-tab [value]="1">Customer Emails</p-tab>
    </p-tablist>
    <p-tabpanels>
      <p-tabpanel [value]="0">
        <div class="tab-content">
          <label for="requestorNames">Add or remove requestor names</label>
          <p-autoComplete
            #namesAutoComplete
            (completeMethod)="onSearch()"
            (onKeyUp)="onNameKeyDown($event)"
            [(ngModel)]="requestorNames"
            [multiple]="true"
            [showEmptyMessage]="false"
            [suggestions]="filteredSuggestions()"
            aria-label="Requestor names"
            id="requestorNames"
            placeholder="Type a name and press Enter"
          />
          <div class="tab-actions">
            <p-button
              (click)="saveRequestorNames()"
              [icon]="Icons.CHECK"
              [loading]="isSavingNames()"
              [style]="{ width: '100%' }"
              label="Save"
              severity="success"
            />
          </div>
        </div>
      </p-tabpanel>
      <p-tabpanel [value]="1">
        <div class="tab-content">
          <label for="customerEmails">Add or remove customer emails</label>
          <p-autoComplete
            #emailsAutoComplete
            (completeMethod)="onSearch()"
            (onKeyUp)="onEmailKeyDown($event)"
            [(ngModel)]="customerEmails"
            [multiple]="true"
            [showEmptyMessage]="false"
            [suggestions]="filteredSuggestions()"
            aria-label="Customer emails"
            id="customerEmails"
            placeholder="Type an email and press Enter"
          />
          @if (emailError()) {
            <small class="email-error">{{ emailError() }}</small>
          }
          <div class="tab-actions">
            <p-button
              (click)="saveCustomerEmails()"
              [icon]="Icons.CHECK"
              [loading]="isSavingEmails()"
              [style]="{ width: '100%' }"
              label="Save"
              severity="success"
            />
          </div>
        </div>
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
}
