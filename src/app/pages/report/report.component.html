<p-card>
  <ng-template pTemplate="header"></ng-template>
  <div class="reports-page">
    <app-custom-title [title]="title" />

    <div class="reports-grid">
      <!-- Open Cost Requests Export -->
      <div class="report-card">
        <div class="report-card__content">
          <h3 class="report-card__title">Open request for quotation</h3>
          <p class="report-card__description">
            Export all open request for quotations to an Excel file. Includes
            all active requests regardless of status.
          </p>
        </div>
        <div class="report-card__footer">
          <p-button
            (click)="exportOpenCostRequests()"
            [icon]="Icons.EXPORT"
            label="Export"
            severity="primary"
          />
        </div>
      </div>

      <!-- Archived Cost Requests Export -->
      <div class="report-card">
        <div class="report-card__content">
          <h3 class="report-card__title">Archived Request for quotations</h3>
          <p class="report-card__description">
            Export archived Request for quotations for a selected date range.
            Maximum range of 3 months at a time.
          </p>
        </div>
        <div class="report-card__footer">
          <p-button
            (click)="openArchivedExportDialog()"
            [icon]="Icons.EXPORT"
            label="Export"
          />
        </div>
      </div>
    </div>
  </div>
</p-card>
