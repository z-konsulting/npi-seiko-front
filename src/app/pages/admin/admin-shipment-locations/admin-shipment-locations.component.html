<p-card>
  <ng-template pTemplate="header">
    <div class="card-header">
      <app-custom-title [title]="title"></app-custom-title>
    </div>
  </ng-template>
  <p-table
    (onLazyLoad)="loadData($event)"
    [lazy]="true"
    [loading]="loading"
    [paginator]="true"
    [resizableColumns]="true"
    [rowsPerPageOptions]="rowsPerPageOptions"
    [rows]="maxRowDefault"
    [totalRecords]="totalRecords"
    [value]="items()"
    class="app-table"
    dataKey="uid"
  >
    <ng-template pTemplate="caption">
      <div class="table-caption">
        <div class="caption-action-button">
          <app-search-input
            (eventSearchValidate)="activateSearch($event)"
          ></app-search-input>
        </div>
        <div class="caption-action-button">
          <p-button
            (click)="createItem()"
            [icon]="Icons.PLUS"
            [raised]="true"
            label="Shipment Location"
          ></p-button>
        </div>
      </div>
    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th>{{ TableColsTitle.NAME }}</th>
        <th>Accepted Currencies</th>
        <th class="col-actions">{{ TableColsTitle.ACTIONS }}</th>
      </tr>
    </ng-template>
    <ng-template let-item pTemplate="body">
      <tr>
        <td class="text-bold">{{ item.name }}</td>
        <td>
          @if (item.acceptedCurrencies?.length) {
            <div class="currency-chips">
              @for (currency of item.acceptedCurrencies; track currency.uid) {
                <p-tag [value]="currency.code" severity="info" />
              }
            </div>
          } @else {
            <span class="text-muted">—</span>
          }
        </td>
        <td class="col-actions">
          <p-button
            (click)="editItem(item)"
            [icon]="Icons.PENCIL"
            [text]="true"
            pTooltip="Edit"
            tooltipPosition="top"
          ></p-button>
          <p-button
            (onClick)="archiveItem(item)"
            [delay]="2000"
            [icon]="Icons.ARCHIVE"
            [text]="true"
            appNoDoubleClick
            pTooltip="Archive"
            severity="danger"
            tooltipPosition="top"
          ></p-button>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr class="p-datatable-emptymessage">
        <td colspan="3">No data</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
