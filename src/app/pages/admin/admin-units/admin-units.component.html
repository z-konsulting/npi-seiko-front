<p-card>
  <ng-template pTemplate="header">
    <div class="card-header">
      <app-custom-title [title]="title"></app-custom-title>
    </div>
  </ng-template>
  <p-table
    (onLazyLoad)="loadData($event)"
    [lazy]="true"
    [loading]="loading"
    [paginator]="true"
    [resizableColumns]="true"
    [rowsPerPageOptions]="rowsPerPageOptions"
    [rows]="maxRowDefault"
    [totalRecords]="totalRecords"
    [value]="units()"
    class="app-table"
    dataKey="uid"
  >
    <ng-template pTemplate="caption">
      <div class="table-caption">
        <div class="caption-action-button">
          <app-search-input
            (eventSearchValidate)="activateSearch($event)"
          ></app-search-input>
        </div>
        <div class="caption-action-button">
          <p-button
            (click)="createUnit()"
            [icon]="Icons.PLUS"
            [raised]="true"
            label="Unit"
          ></p-button>
        </div>
      </div>
    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th>{{ TableColsTitle.NAME }}</th>
        <th class="col-actions">{{ TableColsTitle.ACTIONS }}</th>
      </tr>
    </ng-template>
    <ng-template let-unit pTemplate="body">
      <tr>
        <td class="text-bold">{{ unit.name }}</td>
        <td class="col-actions">
          <p-button
            (click)="editUnit(unit)"
            [icon]="Icons.PENCIL"
            [text]="true"
            pTooltip="Edit"
            tooltipPosition="top"
          ></p-button>
          @if (isAdmin()) {
            <p-button
              (onClick)="archiveUnit(unit)"
              [delay]="2000"
              [icon]="Icons.ARCHIVE"
              [text]="true"
              appNoDoubleClick
              pTooltip="Archive"
              severity="danger"
              tooltipPosition="top"
            ></p-button>
          }
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr class="p-datatable-emptymessage">
        <td colspan="2">No data</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
