<div class="login-split-container">
  <!-- Left: Brand panel -->
  <div class="login-brand-panel">
    <div class="brand-content">
      <img alt="Lokalix logo" class="brand-logo" src="assets/lokalix.svg" />
      <h1 class="brand-tagline">Industrial Cost Management</h1>
      <p class="brand-subtitle">
        Streamline your cost tracking, reporting and analysis in one unified
        platform.
      </p>
      <ul class="brand-features">
        <li><i class="pi pi-check-circle"></i> Real-time cost monitoring</li>
        <li><i class="pi pi-check-circle"></i> Role-based access control</li>
        <li><i class="pi pi-check-circle"></i> Export & reporting tools</li>
      </ul>
    </div>
    <div class="brand-watermark">
      <img alt="" src="assets/lokalix-eyes.png" />
    </div>
  </div>

  <!-- Right: Card -->
  <div class="login-card-panel">
    <div class="login-card-wrapper">
      <p-card>
        <div class="login-card-header">
          <h2 class="login-card-title">Set your password</h2>
        </div>
        <form
          (ngSubmit)="onSubmit()"
          [formGroup]="userSetFirstPasswordForm"
          class="login-form"
        >
          <div class="form-field">
            <label for="password">Password</label>
            <div class="password-container">
              <i
                (click)="changePasswordInputType()"
                [className]="
                  passwordType !== 'password' ? Icons.EYE_SLASH : Icons.EYE
                "
                class="pi"
              ></i>
              <input
                [type]="passwordType"
                class="p-inputtext-lg"
                formControlName="password"
                id="password"
                pInputText
                placeholder="Enter your password"
              />
            </div>
          </div>
          <div class="form-field">
            <label for="repeat-password">Confirm password</label>
            <div class="password-container">
              <i
                (click)="changeRepeatPasswordInputType()"
                [className]="
                  repeatPasswordType !== 'password'
                    ? Icons.EYE_SLASH
                    : Icons.EYE
                "
                class="pi"
              ></i>
              <input
                [type]="repeatPasswordType"
                class="p-inputtext-lg"
                formControlName="repeatPassword"
                id="repeat-password"
                pInputText
                placeholder="Repeat your password"
              />
            </div>
          </div>
          <p-button
            [disabled]="userSetFirstPasswordForm.invalid || !token"
            class="login-submit-btn"
            label="Set password"
            pRipple
            type="submit"
          ></p-button>
        </form>
        <div class="link-wrapper">
          <a class="go-to-link" routerLink="/login">Go to login page</a>
        </div>
      </p-card>
    </div>
  </div>
</div>
