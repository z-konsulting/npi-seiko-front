@if (!data() || data()!.length === 0) {
  <div class="tc-empty">
    <i [class]="Icons.USERS"></i>
    <span>No data available</span>
  </div>
} @else {
  <ol class="tc-list">
    @for (row of data(); track row.customer?.uid; let idx = $index) {
      <li class="tc-item">
        <span class="tc-rank">{{ idx + 1 }}</span>
        <div class="tc-customer-info">
          <span class="tc-customer-name">{{ row.customer?.name ?? "—" }}</span>
          @if (row.customer?.code) {
            <span class="tc-customer-code">{{ row.customer!.code }}</span>
          }
        </div>
        <span class="tc-count">{{ getCount(row) }}</span>
      </li>
    }
  </ol>
}
