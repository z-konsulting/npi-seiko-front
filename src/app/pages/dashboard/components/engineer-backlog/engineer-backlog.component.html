<div class="eb-container">
  <div class="eb-chart-wrapper">
    <div echarts [options]="chartOptions()" class="eb-chart"></div>
    <div class="eb-center-label">
      <span class="eb-total">{{ totalItems() }}</span>
      <span class="eb-total-label">Total</span>
    </div>
  </div>
  <div class="eb-legend">
    <div class="eb-legend-item">
      <span class="eb-dot" style="background:#0891b2"></span>
      <span class="eb-legend-label">Ready to Estimate</span>
      <span class="eb-legend-count">{{ data()?.readyToEstimateCount ?? 0 }}</span>
    </div>
    <div class="eb-legend-item">
      <span class="eb-dot" style="background:#8b5cf6"></span>
      <span class="eb-legend-label">Ready for Review</span>
      <span class="eb-legend-count">{{ data()?.readyForReviewCount ?? 0 }}</span>
    </div>
    <div class="eb-legend-item">
      <span class="eb-dot" style="background:#0e7490"></span>
      <span class="eb-legend-label">Pending Reestimation</span>
      <span class="eb-legend-count">{{ data()?.pendingReestimationCount ?? 0 }}</span>
    </div>
  </div>
</div>
