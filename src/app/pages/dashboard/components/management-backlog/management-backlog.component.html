<div class="mb-container">
  <div class="mb-main-stat">
    <div class="mb-stat-icon">
      <i [class]="Icons.SHIELD"></i>
    </div>
    <div class="mb-stat-body">
      <span class="mb-stat-value">{{ data()?.pendingApprovalCount ?? 0 }}</span>
      <span class="mb-stat-label">Pending Approval</span>
    </div>
  </div>
  @if (data()?.oldestPendingApprovalDate) {
    <div class="mb-oldest">
      <i [class]="Icons.CALENDAR_CLOCK"></i>
      <span class="mb-oldest-label">Oldest since</span>
      <span class="mb-oldest-date">{{
        data()!.oldestPendingApprovalDate | date: "dd MMM yyyy"
      }}</span>
    </div>
  }
</div>
