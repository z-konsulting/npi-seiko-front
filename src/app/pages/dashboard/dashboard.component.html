<p-card>
  <ng-template pTemplate="header">
    <div class="card-header">
      <app-custom-title [title]="title"></app-custom-title>
      <div class="dashboard-header">
        <div class="dashboard-refresh-group">
          @if (lastRefreshedAt()) {
            <span class="dashboard-last-refresh">
              <i [class]="Icons.CLOCK"></i>
              {{ lastRefreshedAt() | date: "dd MMM, HH:mm:ss" }}
            </span>
          }
          <button
            (click)="refresh()"
            [disabled]="loading()"
            class="dashboard-refresh-btn"
            type="button"
          >
            <i [class.pi-spin]="loading()" [class]="Icons.REFRESH"></i>
            Refresh
          </button>
        </div>
      </div>
    </div>
  </ng-template>
  <div class="dashboard-page">
    @if (loading()) {
      <!-- Skeleton loader -->
      <div class="dashboard-skeleton">
        <div class="skeleton-row">
          <p-skeleton borderRadius="12px" height="112px" />
          <p-skeleton borderRadius="12px" height="112px" />
        </div>
        <div class="skeleton-row">
          <p-skeleton borderRadius="12px" height="320px" />
          <p-skeleton borderRadius="12px" height="320px" />
        </div>
        <div class="skeleton-row">
          <p-skeleton borderRadius="12px" height="240px" />
          <p-skeleton borderRadius="12px" height="240px" />
        </div>
        <div class="skeleton-row">
          <p-skeleton borderRadius="12px" height="220px" />
          <p-skeleton borderRadius="12px" height="220px" />
        </div>
      </div>
    } @else {
      <!-- Row 1: KPI Cards -->
      <section class="dashboard-section">
        <app-kpi-cards
          (atRiskClick)="openAtRiskSidebar()"
          (expiredClick)="openExpiredSidebar()"
          [kpis]="dashboard()?.globalKpis"
        />
      </section>

      <!-- Row 2: Lead Time Table + Status Chart -->
      <section class="dashboard-section dashboard-section--split">
        <p-card class="dashboard-card">
          <ng-template pTemplate="header">
            <div class="card-header">
              <div class="card-title-block">
                <i
                  [class]="
                    Icons.CLOCK + ' card-title-icon card-title-icon--warn'
                  "
                ></i>
                <span class="card-title">Worst Lead Times</span>
              </div>
              <span class="card-badge">Top 5</span>
            </div>
          </ng-template>
          <app-worst-lead-time-table
            [data]="dashboard()?.top5WorstCostRequestsByLeadTime"
          />
        </p-card>

        <p-card class="dashboard-card">
          <ng-template pTemplate="header">
            <div class="card-header">
              <div class="card-title-block">
                <i
                  [class]="
                    Icons.CHART_BAR + ' card-title-icon card-title-icon--info'
                  "
                ></i>
                <span class="card-title">Requests by Status</span>
              </div>
            </div>
          </ng-template>
          <app-status-bar-chart
            [data]="dashboard()?.costRequestCountByStatus"
          />
        </p-card>
      </section>

      <!-- Row 3: Backlogs (Engineer | Procurement + Management) -->
      <section class="dashboard-section dashboard-section--split">
        <p-card class="dashboard-card">
          <ng-template pTemplate="header">
            <div class="card-header">
              <div class="card-title-block">
                <i
                  [class]="
                    Icons.COG + ' card-title-icon card-title-icon--violet'
                  "
                ></i>
                <span class="card-title">Engineering Backlog</span>
              </div>
            </div>
          </ng-template>
          <app-engineer-backlog [data]="dashboard()?.engineerBacklog" />
        </p-card>

        <p-card class="dashboard-card">
          <ng-template pTemplate="header">
            <div class="card-header">
              <div class="card-title-block">
                <i
                  [class]="
                    Icons.BRIEFCASE + ' card-title-icon card-title-icon--orange'
                  "
                ></i>
                <span class="card-title">Operations Backlog</span>
              </div>
            </div>
          </ng-template>
          <div class="ops-backlog-container">
            <div class="ops-backlog-section">
              <div class="ops-backlog-section-label">
                <i [class]="Icons.CUBE"></i>
                Procurement
              </div>
              <app-procurement-backlog
                [data]="dashboard()?.procurementBacklog"
              />
            </div>
            <div class="ops-backlog-divider"></div>
            <div class="ops-backlog-section">
              <div class="ops-backlog-section-label">
                <i [class]="Icons.SHIELD"></i>
                Management
              </div>
              <app-management-backlog [data]="dashboard()?.managementBacklog" />
            </div>
          </div>
        </p-card>
      </section>

      <!-- Row 4: Top Clients -->
      <section class="dashboard-section dashboard-section--split">
        <p-card class="dashboard-card">
          <ng-template pTemplate="header">
            <div class="card-header">
              <div class="card-title-block">
                <i
                  [class]="
                    Icons.USERS + ' card-title-icon card-title-icon--blue'
                  "
                ></i>
                <span class="card-title">Top Clients — Open Volume</span>
              </div>
              <span class="card-badge">Top 5</span>
            </div>
          </ng-template>
          <app-top-clients-table
            [data]="dashboard()?.top5ClientsByOpenVolume"
            countLabel="Open Requests"
          />
        </p-card>

        <p-card class="dashboard-card">
          <ng-template pTemplate="header">
            <div class="card-header">
              <div class="card-title-block">
                <i
                  [class]="
                    Icons.STAR + ' card-title-icon card-title-icon--green'
                  "
                ></i>
                <span class="card-title">Top Clients — Active Volume</span>
              </div>
              <span class="card-badge">Top 5</span>
            </div>
          </ng-template>
          <app-top-clients-table
            [data]="dashboard()?.top5ClientsByActiveVolume"
            countLabel="Active Requests"
          />
        </p-card>
      </section>
    }
  </div>
</p-card>

<app-at-risk-sidebar
  [(visible)]="atRiskSidebarVisible"
  [costRequests]="atRiskCostRequests()"
  mode="at-risk"
/>
<app-at-risk-sidebar
  [(visible)]="expiredSidebarVisible"
  [costRequests]="expiredCostRequests()"
  mode="expired"
/>
