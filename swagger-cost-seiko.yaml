              $ref: '#/components/schemas/ShipmentMethodUpdate'
        required: true
      responses:
        '200':
          description: object updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentMethod'
  /shipment-methods:
    get:
      tags:
