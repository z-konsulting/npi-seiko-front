openapi: 3.0.3
info:
  title: Cost seiko
  description: |-
    Cost Seiko API
  contact:
    email: khalil@lokalix-solutions.com
  version: 1.0.0
servers:
  - url: http://localhost:9090
tags:
  - name: public
    description: Everything about Public APIs
  - name: indicator
    description: Everything about Indicator
  - name: dashboard
    description: Everything about Dashboard
  - name: cost-request
    description: Everything about Cost Request APIs
  - name: cost-request-line
    description: Everything about Cost Request Line APIs
  - name: process
    description: Everything about Process APIs
  - name: material
    description: Everything about Material APIs
  - name: tooling
    description: Everything about tooling cost line APIs
  - name: user
    description: Everything about User APIs
  - name: shipment-method
    description: Everything about Shipment method APIs
  - name: global-config
    description: Everything about Global Config APIs
  - name: terms-and-conditions
    description: Everything about Terms and Conditions APIs
  - name: currency
    description: Everything about Currency APIs
  - name: unit
    description: Everything about Unit APIs
  - name: material-category
    description: Everything about Material Category APIs
  - name: supplier-manufacturer
    description: Everything about Supplier/Manufacturer APIs
  - name: customer
    description: Everything about Customer APIs
  - name: manufacturer
    description: Everything about Manufacturer APIs
  - name: product-name
    description: Everything about Product Name APIs
  - name: files
    description: Everything about Files APIs
  - name: bom-config
    description: Everything about BOM configuration APIs
  - name: shipment-location
    description: Everything about DYSON shipment location APIs
paths:
  /bom-configs/search:
    post:
      tags:
        - bom-config
      summary: |
        Search BOM configurations
        Return paginated data ordered alphabetically
      operationId: searchBomConfigurations
      parameters:
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/limitParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BasicSearch'
        required: true
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BomConfigurationsPaginated"
  /bom-configs/{uid}:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    get:
      tags:
        - bom-config
      summary: Retrieve a BOM configuration
      operationId: retrieveBomConfiguration
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BomConfiguration'
    put:
      tags:
        - bom-config
      summary: Update a BOM configuration
      operationId: updateBomConfiguration
      requestBody:
        description: update BOM configuration object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BomConfigurationUpdate'
        required: true
      responses:
        '200':
          description: object updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BomConfiguration'
  /bom-configs:
    get:
      tags:
        - bom-config
      summary: List all BOM configurations
      operationId: listAllBomConfigurations
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BomConfiguration'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags:
        - bom-config
      summary: Create a new BOM configuration
      operationId: createBomConfiguration
      requestBody:
        description: New BOM configuration
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BomConfigurationCreate'
        required: true
      responses:
        '201':
          description: object created
          headers:
            Uid:
              schema:
                $ref: '#/components/schemas/Uid'
              description: uid of the created object.
  /bom-configs/{uid}/archive:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    post:
      tags:
        - bom-config
      summary: Archive a BOM configuration
      operationId: archiveBomConfiguration
      responses:
        '200':
          description: successful operation
  /indicators/monthly-completed-cost-lead-time/graph:
    post:
      tags:
        - indicator
      summary: Retrieve cost requests data monthly completed cost lead time indicators as graph
      operationId: indicatorsCostRequestsDataMonthlyCompletedCostLeadTimeAsGraph
      requestBody:
        description: filter parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IndicatorsBody'
        required: true
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphWhisker"
  /indicators/monthly-completed-cost/graph:
