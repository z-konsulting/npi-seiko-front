components:
  parameters:
    uidParam:
      in: path
      name: uid
      required: true
      schema:
        $ref: '#/components/schemas/Uid'
    offsetParam:
      in: query
      name: offset
      required: true
      schema:
        type: integer
        minimum: 0
        default: 0
      description: The number of items to skip before starting to collect the result set.
    limitParam:
      in: query
      name: limit
      required: true
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20
      description: The numbers of items to return.
    startDateParam:
      in: query
      name: startDate
      required: true
      schema:
        type: string
        format: date
      description: the start date to filter from
    endDateParam:
      in: query
      name: endDate
      required: true
      schema:
        type: string
        format: date
      description: the end date to filter to
    lineUidParam:
      in: path
      name: lineUid
      required: true
      schema:
        $ref: '#/components/schemas/Uid'
      description: The line UID
    costingLineUidParam:
      in: path
      name: costingLineUid
      required: true
      schema:
        $ref: '#/components/schemas/Uid'
      description: The costing line UID
    materialSupplierUidParam:
      in: path
      name: materialSupplierUid
      required: true
      schema:
        $ref: '#/components/schemas/Uid'
      description: The material supplier UID
    shipmentLocationUidParam:
      in: path
      name: shipmentLocationUid
      required: true
      schema:
        $ref: '#/components/schemas/Uid'
      description: The shipment location UID
    activeFilterParam:
      in: query
      name: activeFilter
      required: true
      schema:
        $ref: '#/components/schemas/ActiveFilter'
      description: The active filter
    archivedFilterParam:
      in: query
      name: archivedFilter
      required: true
      schema:
        $ref: '#/components/schemas/ArchivedFilter'
      description: The archived filter
    materialStatusParam:
      in: query
      name: statuses
      required: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/MaterialStatus'
    materialTypeParam:
      in: query
      name: type
      required: false
      schema:
        $ref: '#/components/schemas/MaterialType'
    messageUidParam:
      in: path
      name: messageUid
      required: true
      schema:
        $ref: '#/components/schemas/Uid'
    currencyCodeParam:
      in: query
      name: currencyCode
      required: true
      schema:
        type: string
    supplierAndManufacturerParam:
      in: query
      name: supplierAndManufacturer
      required: true
      schema:
        $ref: '#/components/schemas/SupplierAndManufacturerType'
    costRequestStatusParam:
      in: query
      name: costRequestStatus
      required: true
      schema:
        $ref: '#/components/schemas/CostRequestStatus'
  ##################################################################
  ##################################################################
  ##################################################################
  schemas:
    StringBody:
      type: object
      required:
        - value
      properties:
        value:
          type: string
    SubstituteMaterialsComment:
      type: object
      required:
        - comment
      properties:
        comment:
          type: string
    CustomBomImportBody:
      type: object
      required:
        - temporaryFileId
        - bomConfig
        - quantities
        - costingMethod
      properties:
        temporaryFileId:
          $ref: '#/components/schemas/Uid'
        bomConfig:
          $ref: '#/components/schemas/BomConfigurationForImport'
        quantities:
          type: array
          items:
            type: integer
        costingMethod:
          $ref: '#/components/schemas/CostingMethodType'
    BomConfigurationsPaginated:
      type: object
      allOf:
        - $ref: "#/components/schemas/PaginationInfos"
        - type: object
          required:
            - results
          properties:
            results:
              type: array
              items:
                $ref: "#/components/schemas/BomConfiguration"
    BomConfigurationCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        partNumberCell:
          $ref: '#/components/schemas/ExcelCell'
        revisionCell:
          $ref: '#/components/schemas/ExcelCell'
        descriptionCell:
          $ref: '#/components/schemas/ExcelCell'
        materials:
          $ref: '#/components/schemas/BomConfigurationMaterials'
    BomConfigurationUpdate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        partNumberCell:
          $ref: '#/components/schemas/ExcelCell'
        revisionCell:
          $ref: '#/components/schemas/ExcelCell'
        descriptionCell:
          $ref: '#/components/schemas/ExcelCell'
        materials:
          $ref: '#/components/schemas/BomConfigurationMaterials'
    BomConfiguration:
      type: object
      required:
        - uid
        - name
      properties:
        uid:
          $ref: '#/components/schemas/Uid'
        name:
          type: string
        partNumberCell:
          $ref: '#/components/schemas/ExcelCell'
        revisionCell:
          $ref: '#/components/schemas/ExcelCell'
        descriptionCell:
          $ref: '#/components/schemas/ExcelCell'
        materials:
          $ref: '#/components/schemas/BomConfigurationMaterials'
    BomConfigurationForImport:
      type: object
      properties:
        partNumberCell:
          $ref: '#/components/schemas/ExcelCell'
        revisionCell:
          $ref: '#/components/schemas/ExcelCell'
        descriptionCell:
          $ref: '#/components/schemas/ExcelCell'
        materials:
          $ref: '#/components/schemas/BomConfigurationMaterials'
    ExcelCell:
      type: object
      required:
        - sheetNumber
        - columnNumber
        - rowNumber
      properties:
        sheetNumber:
          type: integer
        columnNumber:
          type: integer
        rowNumber:
          type: integer
    BomConfigurationMaterials:
      type: object
      required:
        - sheetNumber
        - startAtRowNumber
      properties:
        sheetNumber:
          type: integer
        startAtRowNumber:
          type: integer
        manufacturerNameColumnNumber:
          type: integer
        manufacturerPartNumberColumnNumber:
          type: integer
        descriptionColumnNumber:
          type: integer
        quantityColumnNumber:
          type: integer
        unitColumnNumber:
          type: integer
    IndicatorsBody:
      type: object
      properties:
        chartPeriodType:
          $ref: "#/components/schemas/ChartPeriodType"
        customerIds:
          type: array
          items:
            $ref: "#/components/schemas/Uid"
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
    Graph:
      type: object
      required:
        - name
        - xAxis
        - yAxis
      properties:
        name:
          type: string
        xAxis:
          $ref: '#/components/schemas/XAxis'
        yAxis:
          $ref: '#/components/schemas/YAxis'
    GraphWhisker:
      type: object
      required:
        - name
        - xAxis
        - yAxis
      properties:
        name:
          type: string
        xAxis:
          $ref: '#/components/schemas/XAxis'
        yAxis:
          $ref: '#/components/schemas/YAxisWhisker'
    XAxis:
      type: object
      required:
        - data
      properties:
        name:
          type: string
        data:
          type: array
          items:
            type: string
    YAxisWhisker:
      type: object
      required:
        - dataList
      properties:
        name:
          type: string
        dataList:
          type: array
          items:
            $ref: '#/components/schemas/YAxisWhiskerData'
    YAxisWhiskerData:
      type: object
      required:
        - name
        - data
      properties:
        name:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/WhiskerBarData'
    WhiskerBarData:
      type: array
      items:
        type: number
        format: double
    YAxis:
      type: object
      required:
        - dataList
      properties:
        name:
          type: string
        dataList:
          type: array
          items:
            $ref: '#/components/schemas/YAxisData'
    YAxisData:
      type: object
      required:
        - name
        - data
      properties:
        name:
          type: string
        data:
          type: array
          items:
            type: number
            format: double
    Dashboard:
      type: object
      properties:
        globalKpis:
          $ref: '#/components/schemas/DashboardGlobalKpis'
        costRequestCountByStatus:
          type: array
          items:
            $ref: '#/components/schemas/DashboardCostRequestCountByStatus'
        top5WorstCostRequestsByLeadTime:
          description: Top 5 non-finalized cost requests with the oldest creation date
          type: array
          items:
            $ref: '#/components/schemas/DashboardCostRequest'
        engineerBacklog:
          $ref: '#/components/schemas/DashboardEngineerBacklog'
        procurementBacklog:
          $ref: '#/components/schemas/DashboardProcurementBacklog'
        managementBacklog:
          $ref: '#/components/schemas/DashboardManagementBacklog'
        top5ClientsByOpenVolume:
          description: Top 5 customers with the most active (non-finalized) cost requests
          type: array
          items:
            $ref: '#/components/schemas/DashboardClientOpenVolume'
        top5ClientsByActiveVolume:
          description: Top 5 customers with the most ACTIVE cost requests
          type: array
          items:
            $ref: '#/components/schemas/DashboardClientActiveVolume'

    DashboardGlobalKpis:
      type: object
      properties:
        totalOpenCostRequests:
          description: Number of non-finalized cost requests (exclude final status)
          type: integer
        averageLeadTimeDaysOpenCostRequests:
          description: Average number of days since creation for open cost requests
          type: number
          format: double
        totalActiveCostRequests:
          description: Number of ACTIVE cost requests
          type: integer
        averageLeadTimeDaysActiveCostRequests:
          description: Average number of days from creation to finalization for ACTIVE cost requests
          type: number
          format: double
        pipelineValueInTargetCurrency:
          description: Sum of totalLinesCostInTargetCurrency for all in-progress cost requests (excludes PENDING_INFORMATION )
          type: number
          format: double
        totalWonCostRequests:
          description: Number of WON cost requests this month
          type: integer
        averageLeadTimeDaysWonCostRequests:
          description: Average number of days from creation to finalization for WON cost requests
          type: number
          format: double
        totalLostCostRequests:
          description: Number of LOST cost requests this month
          type: integer
        averageLeadTimeDaysLostCostRequests:
          description: Average number of days from creation to finalization for LOST cost requests
          type: number
          format: double
        totalNewRevisionCostRequests:
          description: Number of NEW_REVISION_CREATED cost requests this month
          type: integer
        averageLeadTimeDaysNewRevisionCostRequests:
          description: Average number of days from creation to finalization for NEW_REVISION_CREATED cost requests
          type: number
          format: double
        expiredCostRequest:
          description: All cost request of non-archived, non-finalized cost requests whose expiration date has passed
          type: array
          items:
            $ref: '#/components/schemas/CostRequest'
        costRequestsAtRisk:
          description: Cost request non final status  with purchaseOrderExpectedDate within the next 14 days
          type: array
          items:
            $ref: '#/components/schemas/CostRequest'

    DashboardCostRequestCountByStatus:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/CostRequestStatus'
        count:
          type: integer

    DashboardEngineerBacklog:
      type: object
      properties:
        readyToEstimateCount:
          type: integer
        readyForReviewCount:
          type: integer
        pendingReestimationCount:
          type: integer

    DashboardProcurementBacklog:
      type: object
      properties:
        materialsToEstimateCount:
          description: Number of MaterialLine records with material status TO_BE_ESTIMATED across all active cost request lines
          type: integer
        toolingToOutsourceCount:
          description: Number of ToolingCostLine records with outsourcingStatus TO_BE_ESTIMATED
          type: integer
        costLinesToOutsourceCount:
          description: Number of CostRequestLine records with outsourced=true and outsourcingStatus TO_BE_ESTIMATED
          type: integer

    DashboardManagementBacklog:
      type: object
      properties:
        pendingApprovalCount:
          description: Number of cost request lines in PENDING_APPROVAL status
          type: integer
        oldestPendingApprovalDate:
          description: Creation date of the oldest cost request line in PENDING_APPROVAL status
          type: string
          format: date-time

    DashboardClientActiveVolume:
      type: object
      properties:
        customer:
          $ref: '#/components/schemas/Customer'
        activeCostRequestsCount:
          description: Number of ACTIVE cost requests for this customer
          type: integer
    DashboardClientOpenVolume:
      type: object
      properties:
        customer:
          $ref: '#/components/schemas/Customer'
        openCostRequestsCount:
          description: Number of active (non-finalized) cost requests for this customer
          type: integer
    DashboardCostRequest:
      type: object
      required:
        - quotationId
        - quotationRevision
        - lineNumber
        - averageLeadTime
      properties:
        costRequestReferenceNumber:
          type: string
        costRequestRevision:
          type: integer
        customer:
          $ref: '#/components/schemas/Customer'
        status:
          $ref: '#/components/schemas/CostRequestStatus'
        averageLeadTime:
          type: number
          format: double
        creationDate:
          type: string
          format: date-time
    CostRequestSearch:
      allOf:
        - $ref: '#/components/schemas/BasicSearch'
        - type: object
          properties:
            costRequestAcceptedStatuses:
              description: emptyList if no filter is applied
              type: array
              items:
                $ref: '#/components/schemas/CostRequestStatus'
            costRequestLineAcceptedStatuses:
              description: emptyList if no filter is applied
              type: array
              items:
                $ref: '#/components/schemas/CostRequestStatus'
    GenerateQuotationPdfBody:
      type: object
      required:
        - paymentTerms
        - preparedBy
        - approvedBy
        - lineExtraInfos
      properties:
        paymentTerms:
          type: string
        preparedBy:
          type: string
        approvedBy:
          type: string
        globalComment:
          type: string
        lineExtraInfos:
          description: extra infos to be added to each quotation line (must be same size as number of active lines)
          type: array
          items:
            $ref: '#/components/schemas/QuotationLineExtraInfo'
    QuotationLineExtraInfo:
      type: object
      required:
        - leadTime
        - remarks
      properties:
        leadTime:
          type: string
        remarks:
          type: string
    RejectBody:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
    SetMarkupBody:
      type: object
      required:
        - markup
      properties:
        markup:
          type: number
          format: double
    SetToolingStrategyBody:
      type: object
      required:
        - strategy
      properties:
        strategy:
          $ref: "#/components/schemas/ToolingStrategy"
    ShipmentMethodsPaginated:
      type: object
      allOf:
        - $ref: "#/components/schemas/PaginationInfos"
        - type: object
          required:
            - results
          properties:
            results:
              type: array
              items:
                $ref: "#/components/schemas/ShipmentMethod"
    ShipmentMethod:
      allOf:
        - $ref: "#/components/schemas/ShipmentMethodCreate"
        - type: object
          required:
            - uid
          properties:
            uid:
              $ref: '#/components/schemas/Uid'
    ShipmentMethodCreate:
      type: object
      required:
        - name
        - percentage
      properties:
        name:
          type: string
