      summary: List all shipment methods
      operationId: listAllShipmentMethods
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShipmentMethod'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags:
        - shipment-method
      summary: Create a new shipment method
      operationId: createShipmentMethod
      requestBody:
        description: New shipment method
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipmentMethodCreate'
        required: true
      responses:
        '201':
          description: object created
          headers:
            Uid:
              schema:
                $ref: '#/components/schemas/Uid'
              description: uid of the created object.
  /shipment-methods/{uid}/archive:
    parameters:
