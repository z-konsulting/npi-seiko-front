openapi: 3.0.3
info:
  title: NPI seiko
  description: |-
    NPI Seiko API
  contact:
    email: khalil@lokalix-solutions.com
  version: 1.0.0
servers:
  - url: http://localhost:9090
tags:
  - name: public
    description: Everything about Public APIs
  - name: npi-order
    description: Everything about NPI Order APIs
  - name: dashboard
    description: Everything about Dashboard
  - name: user
    description: Everything about User APIs
  - name: files
    description: Everything about Files APIs
  - name: customer
    description: Everything about Customer APIs
paths:
  /customers/search:
    post:
      tags:
        - customer
      summary: |
        Search customers with filter:
        - freetext looking at name/code
        Return paginated data ordered alphabetically
      operationId: searchCustomers
      parameters:
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/limitParam'
      requestBody:
        description: search customers
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BasicSearch'
        required: true
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomersPaginated"
  /customers/{uid}:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    get:
      tags:
        - customer
      summary: Retrieve a customer
      operationId: retrieveCustomer
      responses:
        '200':
          description: customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
    put:
      tags:
        - customer
      summary: Update a customer
      operationId: updateCustomer
      requestBody:
        description: update customer object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerUpdate'
        required: true
      responses:
        '200':
          description: object updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
  /customers:
    get:
      tags:
        - customer
      summary: List all customers
      operationId: listAllCustomers
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags:
        - customer
      summary: Create a new customer
      operationId: createCustomer
      requestBody:
        description: New customer
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreate'
        required: true
      responses:
        '201':
          description: object created
          headers:
            Uid:
              schema:
                $ref: '#/components/schemas/Uid'
              description: uid of the created object.
  /customers/{uid}/archive:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    post:
      tags:
        - customer
      summary: Archive a customer
      operationId: archiveCustomer
      responses:
        '200':
          description: successful operation
  /customers/{uid}/requestor-names:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    get:
      tags:
        - customer
      summary: retrieve requestor names from customer
      operationId: retrieveRequestorNames
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
    put:
      tags:
        - customer
      summary: set requestor names to customer
      operationId: setRequestorNames
      requestBody:
        description: requestor names
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
        required: true
      responses:
        '200':
          description: successful operation
  /customers/{uid}/add-requestor-names:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    post:
      tags:
        - customer
      summary: add requestor names to customer
      operationId: addRequestorNames
      requestBody:
        description: requestor names
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
        required: true
      responses:
        '200':
          description: successful operation
  /dashboard:
    get:
      tags:
        - dashboard
      summary: retrieve dashboard data
      operationId: retrieveDashboard
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dashboard'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedRequest'
        '403':
          $ref: '#/components/responses/ForbiddenRequest'
  /temporary-files/upload:
    post:
      tags:
        - files
      summary: upload a files for save in server
      operationId: uploadFilesForSave
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadFiles"
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileInfo"
  /temporary-files/delete:
    post:
      tags:
        - files
      summary: delete saved file in server
      operationId: deleteFilesForSave
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Uid"
      responses:
        '200':
          description: Successful operation
  /temporary-files/download:
    post:
      tags:
        - files
      summary: download saved file in server
      operationId: downloadFilesForSave
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Uid"
      responses:
        '200':
          description: Successful operation
  /public/login:
    post:
      tags:
        - public
      summary: Login user
      operationId: loginUser
      requestBody:
        description: Login details
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDetails'
        required: true
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoggedUser'
        '400':
          $ref: '#/components/responses/BadRequest'
  /public/app/login:
    post:
      tags:
        - public
      summary: Login user from android app
      operationId: loginUserFromAndroidApp
      requestBody:
        description: Login details
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDetails'
        required: true
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoggedUser'
        '400':
          $ref: '#/components/responses/BadRequest'
  /public/forgot-password:
    post:
      tags:
        - public
      summary: user forgot password
      operationId: forgotPasswordUser
      requestBody:
        description: User forgot password details
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserForgotPassword'
        required: true
      responses:
        '200':
          description: successful operation
        '400':
          $ref: '#/components/responses/BadRequest'
  /public/reset-password:
    post:
      tags:
        - public
      summary: user reset password
      operationId: resetPasswordUser
      requestBody:
        description: User reset password details
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserResetPassword'
        required: true
      responses:
        '200':
          description: successful operation
        '400':
          $ref: '#/components/responses/BadRequest'
  /public/set-first-password:
    post:
      tags:
        - public
      summary: user set first password
      operationId: setFirstPasswordUser
      requestBody:
        description: User reset password details
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserResetPassword'
        required: true
      responses:
        '200':
          description: successful operation
        '400':
          $ref: '#/components/responses/BadRequest'
  /users/logout:
    post:
      tags:
        - user
      summary: Logout user
      operationId: logoutUser
      responses:
        '200':
          description: successful operation user logged out
        '400':
          $ref: '#/components/responses/BadRequest'
  /users/search:
    post:
      tags:
        - user
      summary: |
        Search users with filter:
        - freetext looking at email/username
        - active yes/no
        Return paginated data ordered alphabetically
      operationId: searchUsers
      parameters:
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/activeFilterParam'
      requestBody:
        description: search users
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BasicSearch'
        required: true
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersPaginated"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedRequest'
        '403':
          $ref: '#/components/responses/ForbiddenRequest'
  /users/check-license-validity:
    get:
      tags:
        - user
      summary: |
        Check that licenses are valid for user creation
      operationId: checkLicenseValidity
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserLicenseValid"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedRequest'
        '403':
          $ref: '#/components/responses/ForbiddenRequest'
  /users/{uid}:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    get:
      tags:
        - user
      summary: Retrieve a new user
      operationId: retrieveUser
      responses:
        '200':
          description: user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedRequest'
        '403':
          $ref: '#/components/responses/ForbiddenRequest'
  /users/{uid}/resend-user-creation-email:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    post:
      tags:
        - user
      summary: Resend a new user creation email
      operationId: resendUserCreationEmail
      responses:
        '200':
          description: success
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedRequest'
        '403':
          $ref: '#/components/responses/ForbiddenRequest'
  /users/email:
    post:
      tags:
        - user
      summary: Create a new user with email address
      operationId: createUserEmail
      requestBody:
        description: New user with email address
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserWithEmailCreate'
        required: true
      responses:
        '201':
          description: object created
          headers:
            Uid:
              schema:
                $ref: '#/components/schemas/Uid'
              description: uid of the created object.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedRequest'
        '403':
          $ref: '#/components/responses/ForbiddenRequest'
  /users/username:
    post:
      tags:
        - user
      summary: Create a new user with username
      operationId: createUserUsername
      requestBody:
        description: New user with username
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserWithUsernameCreate'
        required: true
      responses:
        '201':
          description: object created
          headers:
            Uid:
              schema:
                $ref: '#/components/schemas/Uid'
              description: uid of the created object.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedRequest'
        '403':
          $ref: '#/components/responses/ForbiddenRequest'
  /users/email/{uid}:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    put:
      tags:
        - user
      summary: Update a user with email address
      operationId: updateUserWithEmail
      requestBody:
        description: update user with email address object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserWithEmailUpdate'
        required: true
      responses:
        '200':
          description: object updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedRequest'
        '403':
          $ref: '#/components/responses/ForbiddenRequest'
  /users/username/{uid}:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    put:
      tags:
        - user
      summary: Update a user with username
      operationId: updateUserWithUsername
      requestBody:
        description: update user with username object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserWithUsernameUpdate'
        required: true
      responses:
        '200':
          description: object updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedRequest'
        '403':
          $ref: '#/components/responses/ForbiddenRequest'
  /users/username/{uid}/password:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    post:
      tags:
        - user
      summary: Update a user with username only password
      operationId: updateUserPassword
      requestBody:
        description: update user with username object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUsernameResetPassword'
        required: true
      responses:
        '200':
          description: object updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedRequest'
        '403':
          $ref: '#/components/responses/ForbiddenRequest'
  /users/{uid}/activate:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    post:
      tags:
        - user
      summary: Activate a user
      operationId: activateUser
      responses:
        '200':
          description: successful operation
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedRequest'
        '403':
          $ref: '#/components/responses/ForbiddenRequest'
  /users/{uid}/deactivate:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    post:
      tags:
        - user
      summary: Deactivate a user
      operationId: deactivateUser
      responses:
        '200':
          description: successful operation
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedRequest'
        '403':
          $ref: '#/components/responses/ForbiddenRequest'
  /npi-orders/search:
    post:
      tags:
        - npi-order
      summary: |
        Search npi order with filter
        Return paginated data ordered by creationDate DESC
      operationId: searchNpiOrders
      parameters:
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/archivedFilterParam'
      requestBody:
        description: search cost requests
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NpiOrderSearch'
        required: true
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NpiOrdersPaginated"
  /npi-orders/{uid}:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    get:
      tags:
        - npi-order
      summary: Retrieve a npi order
      operationId: retrieveNpiOrder
      responses:
        '200':
          description: npi order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NpiOrder'
    put:
      tags:
        - npi-order
      summary: Update a npi order
      operationId: updateNpiOrder
      requestBody:
        description: update npi order object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NpiOrderUpdate'
        required: true
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NpiOrder'
        '400':
          $ref: '#/components/responses/BadRequest'
  /npi-orders:
    post:
      tags:
        - npi-order
      summary: Create a new npi-order
      operationId: createNpiOrder
      requestBody:
        description: Create npi order object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NpiOrderCreate'
        required: true
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NpiOrder'
        '400':
          $ref: '#/components/responses/BadRequest'
  /npi-orders/open/export:
    get:
      tags:
        - npi-order
      summary: Generate open NPI report
      operationId: exportOpenNPIOrder
      responses:
        '200':
          description: successful operation
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
  /npi-orders/archived/export:
    get:
      tags:
        - npi-order
      summary: Generate archived NPI report
      operationId: exportArchivedNpiReport
      responses:
        '200':
          description: successful operation
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
  /npi-orders/{uid}/archive:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    post:
      tags:
        - npi-order
      summary: Archive a npi order
      operationId: archiveNpiOrder
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NpiOrder'
        '400':
          $ref: '#/components/responses/BadRequest'
  /npi-orders/{uid}/abort:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    post:
      tags:
        - npi-order
      summary: abort a npi order and freeze all related data
      operationId: abortNpiOrder
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NpiOrder'
        '400':
          $ref: '#/components/responses/BadRequest'
  /npi-orders/{uid}/files/upload:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    post:
      tags:
        - npi-order
      summary: upload a npi order files
      operationId: uploadNpiOrdersFiles
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadFiles"
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileInfo"
  /npi-orders/{uid}/files/download:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    post:
      tags:
        - npi-order
      summary: download a npi order files
      operationId: downloadNpiOrderFiles
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Uid"
      responses:
        '200':
          description: Successful operation
  /npi-orders/{uid}/files/delete:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    post:
      tags:
        - npi-order
      summary: delete a npi orderfiles
      operationId: deleteNpiOrderFiles
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Uid"
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileInfo"
  /npi-orders/{uid}/files:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    get:
      tags:
        - npi-order
      summary: get npi order files
      operationId: getAllNpiOrdersFiles
      parameters:
        - $ref: '#/components/parameters/uidParam'
      responses:
        '200':
          description: successful operation, all npi order files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileInfo'
  /npi-orders/{uid}/process:
    parameters:
      - $ref: '#/components/parameters/uidParam'
    get:
      tags:
        - npi-order
      summary: Retrieve a npi order process
      operationId: retriveNpiOrderProcess
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Process"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedRequest'
        '403':
          $ref: '#/components/responses/ForbiddenRequest'
  /npi-orders/{uid}/process/lines/{lineUid}/status:
    parameters:
      - $ref: '#/components/parameters/uidParam'
      - $ref: '#/components/parameters/lineUidParam'
    post:
      tags:
        - npi-order
      summary: update a npi order process line status
      operationId: updateNpiOrderProcessLineStatus
      requestBody:
        description: New recipe line status
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessLineStatusUpdateBody'
        required: true
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ProcessLine"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedRequest'
        '403':
          $ref: '#/components/responses/ForbiddenRequest'
        '409':
          $ref: '#/components/responses/EntityAlreadyExistsRequest'
  /npi-orders/{uid}/process/lines/{lineUid}/statuses:
    parameters:
      - $ref: '#/components/parameters/uidParam'
      - $ref: '#/components/parameters/lineUidParam'
    get:
      tags:
        - npi-order
      summary: Retrieve a npi order process line statuses history
      operationId: retrieveNpiOrderStatusesHistory
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessLineStatusesHistory"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedRequest'
        '403':
          $ref: '#/components/responses/ForbiddenRequest'
  /npi-orders/{uid}/process/lines/{lineUid}/remaining-time:
    parameters:
      - $ref: '#/components/parameters/uidParam'
      - $ref: '#/components/parameters/lineUidParam'
    put:
      tags:
        - npi-order
      summary: Update the remaining time of a process line (must be IN_PROGRESS)
      operationId: updateProcessLineRemainingTime
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessLineRemainingTimeUpdate'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessLine"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedRequest'
        '403':
          $ref: '#/components/responses/ForbiddenRequest'
  /npi-orders/{uid}/process/lines/{lineUid}/material-delivery-date/import:
    parameters:
      - $ref: '#/components/parameters/uidParam'
      - $ref: '#/components/parameters/lineUidParam'
    post:
      tags:
        - npi-order
      summary: Read material latest delivery date from an uploaded file
      operationId: importMaterialLatestDeliveryDate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessLineMaterialDeliveryDateImport'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: string
                format: date
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedRequest'
        '403':
          $ref: '#/components/responses/ForbiddenRequest'
  /npi-orders/{uid}/process/lines/{lineUid}/upload:
    parameters:
      - $ref: '#/components/parameters/uidParam'
      - $ref: '#/components/parameters/lineUidParam'
    post:
      tags:
        - npi-order
      summary: upload a npi order process line files
      operationId: uploadNpiOrdersProcessLineFiles
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadFiles"
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileInfo"
  /npi-orders/{uid}/process/lines/{lineUid}/download:
    parameters:
      - $ref: '#/components/parameters/uidParam'
      - $ref: '#/components/parameters/lineUidParam'
    post:
      tags:
        - npi-order
      summary: download a npi order process line files
      operationId: downloadNpiOrderProcessLineFiles
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Uid"
      responses:
        '200':
          description: Successful operation
  /npi-orders/{uid}/process/lines/{lineUid}/delete:
    parameters:
      - $ref: '#/components/parameters/uidParam'
      - $ref: '#/components/parameters/lineUidParam'
    post:
      tags:
        - npi-order
      summary: delete a npi order process line files
      operationId: deleteNpiOrderProcessLineFiles
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Uid"
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileInfo"
  /npi-orders/{uid}/process/lines/{lineUid}/files:
    parameters:
      - $ref: '#/components/parameters/uidParam'
      - $ref: '#/components/parameters/lineUidParam'
    get:
      tags:
        - npi-order
      summary: get npi order process line process line files
      operationId: getAllNpiOrdersProcessLineFiles
      parameters:
        - $ref: '#/components/parameters/uidParam'
      responses:
        '200':
          description: successful operation, all npi order process line files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileInfo'
components:
  parameters:
    uidParam:
      in: path
      name: uid
      required: true
      schema:
        $ref: '#/components/schemas/Uid'
    offsetParam:
      in: query
      name: offset
      required: true
      schema:
        type: integer
        minimum: 0
        default: 0
      description: The number of items to skip before starting to collect the result set.
    limitParam:
      in: query
      name: limit
      required: true
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20
      description: The numbers of items to return.
    lineUidParam:
      in: path
      name: lineUid
      required: true
      schema:
        $ref: '#/components/schemas/Uid'
    startDateParam:
      in: query
      name: startDate
      required: true
      schema:
        type: string
        format: date
      description: the start date to filter from
    endDateParam:
      in: query
      name: endDate
      required: true
      schema:
        type: string
        format: date
      description: the end date to filter to
    activeFilterParam:
      in: query
      name: activeFilter
      required: true
      schema:
        $ref: '#/components/schemas/ActiveFilter'
      description: The active filter
    archivedFilterParam:
      in: query
      name: archivedFilter
      required: true
      schema:
        $ref: '#/components/schemas/ArchivedFilter'
      description: The archived filter
    messageUidParam:
      in: path
      name: messageUid
      required: true
      schema:
        $ref: '#/components/schemas/Uid'
  ##################################################################
  ##################################################################
  ##################################################################
  schemas:
    CustomersPaginated:
      type: object
      allOf:
        - $ref: "#/components/schemas/PaginationInfos"
        - type: object
          required:
            - results
          properties:
            results:
              type: array
              items:
                $ref: "#/components/schemas/Customer"
    CustomerCreate:
      type: object
      required:
        - name
        - code
      properties:
        name:
          type: string
        code:
          type: string
    CustomerUpdate:
      type: object
      required:
        - name
        - code
      properties:
        name:
          type: string
        code:
          type: string
    Customer:
      type: object
      required:
        - uid
        - name
        - code
      properties:
        uid:
          $ref: '#/components/schemas/Uid'
        name:
          type: string
        code:
          type: string
    Dashboard:
      type: object
      properties:
        globalKpis:
          $ref: '#/components/schemas/DashboardGlobalKpis'
        worstNpiOrders:
          type: array
          items:
            $ref: '#/components/schemas/DashboardWorstNpiOrder'
        npiCountByStatus:
          type: array
          items:
            $ref: '#/components/schemas/DashboardNpiCountByStatus'
        processStageKpis:
          type: array
          items:
            $ref: '#/components/schemas/DashboardProcessStageKpi'

    DashboardGlobalKpis:
      type: object
      properties:
        openNpiCount:
          description: Number of non-finalized NPI orders
          type: integer
        completedNpiCount:
          description: Number of completed NPI orders
          type: integer
        averageLeadTimeDaysOpenNpiOrders:
          description: Average number of days between creationDate and now for open NPI orders
          type: number
          format: double
        averageLeadTimeDaysCompletedNpiOrders:
          description: Average number of days between creationDate and finalizationDate for completed NPI orders
          type: number
          format: double
        totalOpenQuantity:
          description: Total quantity of all open NPI orders
          type: integer
        customerApprovalPendingCount:
          description: Number of NPI orders currently waiting for customer approval (Customer Approval step IN_PROGRESS)
          type: integer

    DashboardWorstNpiOrder:
      type: object
      properties:
        uid:
          $ref: '#/components/schemas/Uid'
        purchaseOrderNumber:
          type: string
        partNumber:
          type: string
        targetDeliveryDate:
          type: string
          format: date
        plannedDeliveryDate:
          type: string
          format: date
        delayInDays:
          description: Difference in days between plannedDeliveryDate and targetDeliveryDate (positive = late)
          type: integer

    DashboardNpiCountByStatus:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/NpiOrderStatus'
        count:
          type: integer

    DashboardProcessStageKpi:
      type: object
      properties:
        processName:
          type: string
        notStartedCount:
          type: integer
        inProgressCount:
          type: integer

    NpiOrderSearch:
      allOf:
        - $ref: '#/components/schemas/BasicSearch'
        - type: object
          properties:
            statuses:
              description: emptyList if no filter is applied
              type: array
              items:
                $ref: '#/components/schemas/NpiOrderStatus'
    PaginationInfos:
      type: object
      required:
        - total
        - page
        - per_page
        - has_next
        - has_prev
      properties:
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }
        has_next: { type: boolean }
        has_prev: { type: boolean }
    BasicSearch:
      type: object
      required:
        - searchText
      properties:
        searchText:
          type: string
    ActiveFilter:
      type: string
      enum:
        - ACTIVE_ONLY
        - INACTIVE_ONLY
        - ALL
    ArchivedFilter:
      type: string
      enum:
        - NON_ARCHIVED_ONLY
        - ARCHIVED_ONLY
        - ALL
    UserForgotPassword:
      type: object
      required:
        - email
      properties:
        email:
          type: string
    UserResetPassword:
      type: object
      required:
        - token
        - password
      properties:
        token:
          type: string
        password:
          type: string
    UserUsernameResetPassword:
      type: object
      required:
        - password
      properties:
        password:
          type: string
    LoginDetails:
      type: object
      properties:
        login:
          type: string
        password:
          type: string
